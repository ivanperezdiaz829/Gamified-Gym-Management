<div class="zone-container">
  @if (viewMode === 'list') {
    <div class="zone-header">
      <h2 class="text-white">Workout Plans Zone</h2>
      <button class="btn-submit" (click)="openCreateMode()">+ Create New Plan</button>
    </div>

    <div class="plans-grid">
      @if (plans.length === 0) {
        <p class="text-white">No plans created yet. Create one to get started!</p>
      }

      @for (plan of plans; track plan.id) {
        <div class="form-card">
          
          <div class="card-header">
            <h3 class="text-blue" style="margin:0">{{ plan.planName }}</h3>
            <div class="card-actions">
              <button class="btn-edit" (click)="editPlan(plan)">Edit</button>
              <button class="btn-remove-plan" (click)="deletePlan(plan.id)" title="Borrar Plantilla">✕</button>
            </div>
          </div>
          
          <p class="text-white" style="margin-bottom: 15px; margin-top: 10px;">{{ plan.exercises.length }} Exercises</p>
          
          <div class="assign-section">
            <select [(ngModel)]="selectedTraineeForPlan[plan.id!]" class="dark-input">
              <option value="" disabled>Select Trainee to Assign...</option>
              @for (trainee of trainees; track trainee.id) {
                <option [value]="trainee.id">{{ trainee.name }}</option>
              }
            </select>
            <button class="btn-submit" (click)="assignPlan(plan)">Assign</button>
          </div>
        </div>
      }
    </div>
  } @else {
    <button class="btn-remove back-btn" (click)="viewMode = 'list'">← Back to Zone</button>
    
    <app-create-workout-plan 
      [planToEdit]="planToEdit" 
      (planCreated)="onPlanCreated()">
    </app-create-workout-plan>
  }
</div>
