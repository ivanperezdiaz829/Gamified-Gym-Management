<div class="zone-container">
  @if (viewMode === 'list') {
    <div class="zone-header">
      <h2 class="text-white">Workout Plans Zone</h2>
      <button class="btn-submit" (click)="viewMode = 'create'">+ Create New Plan</button>
    </div>

    <div class="plans-grid">
      @if (plans.length === 0) {
        <p class="text-white">No plans created yet. Create one to get started!</p>
      }

      @for (plan of plans; track plan.id) {
        <div class="form-card">
          <h3 class="text-blue">{{ plan.planName }}</h3>
          <p class="text-white" style="margin-bottom: 15px;">{{ plan.exercises.length }} Exercises</p>
          
          <div class="assign-section">
            <select [(ngModel)]="selectedTraineeForPlan[plan.id!]" class="dark-input">
              <option value="" disabled selected>Select Trainee to Assign...</option>
              @for (trainee of trainees; track trainee.id) {
                <option [value]="trainee.id">{{ trainee.name }}</option>
              }
            </select>
            <button class="btn-submit" (click)="assignPlan(plan)">Assign</button>
          </div>
        </div>
      }
    </div>
  } @else {
    <button class="btn-remove back-btn" (click)="viewMode = 'list'">← Back to Zone</button>
    
    <div (click)="loadData()">
      <app-create-workout-plan></app-create-workout-plan>
    </div>
  }
</div>
